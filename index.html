<style>
:root{
  --blue:#1C75BC;--blue-dark:#252868;--blue-hover:#0056A0;
  --blue-light:#E8F3FB;--blue-mid:#B8D9F0;
  --bg:#F0F4F8;--bg-white:#FFFFFF;--bg-card:#F5F8FC;
  --border:#D0DCE8;--border2:#1C75BC;
  --text:#1A2535;--text2:#6B7A90;--text3:#9AAABB;
  --green:#00916E;--green-light:#E6F5F1;
  --red:#DC2626;--red-light:#FEF2F2;
  --amber:#D97706;--amber-light:#FFFBEB;
  --shadow:0 1px 3px rgba(28,117,188,.12),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(28,117,188,.15);
  --radius:8px;--radius-lg:12px;
  --font:'Nunito',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* HEADER */
.app-header{background:var(--bg-white);border-bottom:3px solid var(--blue);box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:0}
.header-logo{width:40px;height:40px;object-fit:contain;flex-shrink:0}
.header-brand{display:flex;flex-direction:column;margin-left:10px}
.header-brand-name{font-size:14px;font-weight:700;color:var(--blue);line-height:1.2;letter-spacing:.01em}
.header-brand-sub{font-size:10px;color:var(--text2);line-height:1.2}
.header-divider{width:1px;height:28px;background:var(--blue);margin:0 16px;opacity:.3}
.header-title{font-size:13px;color:var(--text2);font-weight:500}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.header-version{font-size:10px;color:var(--text3)}

.app{max-width:960px;margin:0 auto;padding:24px 20px 60px}

/* FORMS */
select,input[type=text],input[type=date],input[type=number],textarea{
  width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--radius);
  background:var(--bg-white);color:var(--text);font-size:13px;font-family:var(--font);outline:none;
  transition:border-color .15s,box-shadow .15s}
select:focus,input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(28,117,188,.12)}
textarea{resize:vertical}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
button{font-family:var(--font);cursor:pointer}

/* BUTTONS */
.btn-primary{padding:8px 18px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);
  font-size:13px;font-weight:600;transition:background .15s,transform .1s;box-shadow:var(--shadow)}
.btn-primary:hover{background:var(--blue-hover)}
.btn-primary:active{transform:scale(.98)}
.btn-outline{padding:7px 14px;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:12px;color:var(--text2);font-weight:500;transition:all .15s}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-ghost{padding:5px 10px;background:transparent;border:1.5px solid var(--blue);border-radius:var(--radius);
  font-size:11px;color:var(--blue);font-weight:600;transition:all .15s}
.btn-ghost:hover{background:var(--blue-light)}
.btn-danger{padding:5px 10px;background:transparent;border:1.5px solid #fca5a5;border-radius:var(--radius);font-size:11px;color:var(--red)}

/* CARDS */
.card{background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;box-shadow:var(--shadow)}
.card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-md)}

/* TAGS / BADGES */
.tag{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;gap:4px}

/* SECTION TITLE */
.section-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.1em;margin:22px 0 10px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FIELD */
.field{margin-bottom:12px}
.field-label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600}
.field-hint{font-size:11px;color:var(--text3);margin-top:3px}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* CHECKBOX ROW */
.cb-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;
  color:var(--text);transition:color .15s}
.cb-row:hover{color:var(--blue)}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;
  margin-bottom:-2px;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;
  white-space:nowrap;transition:all .15s;font-family:var(--font)}
.tab.active{border-bottom-color:var(--blue);color:var(--blue);font-weight:700}

/* STATUS BUTTONS */
.status-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid}

/* CHECKLIST */
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg-card);cursor:pointer;transition:opacity .15s}
.checklist-item.overdue{background:#fff8f8;border-left:3px solid var(--red);padding-left:8px;margin-left:-8px;border-radius:0 var(--radius) var(--radius) 0}
.chk-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--bg-white);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.chk-box.done{border-color:var(--green);background:var(--green-light)}

/* METRIC CARDS */
.metric{background:var(--bg-card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.metric-value{font-size:20px;font-weight:700;color:var(--text)}

/* BUDGET */
.budget-row{display:flex;justify-content:space-between;padding:9px 14px;font-size:13px;border-bottom:1px solid var(--bg-card)}
.budget-total{display:flex;justify-content:space-between;padding:12px 14px;background:var(--blue-light);font-weight:700;border-top:2px solid var(--blue-mid)}

/* ALERTS */
.alert-warn{background:var(--amber-light);border:1px solid #FDE68A;border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#92400E}
.alert-info{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#1E40AF}
.alert-danger{background:var(--red-light);border:1px solid #FECACA;border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#991B1B}
.alert-success{background:var(--green-light);border:1px solid #A7F3D0;border-radius:var(--radius);padding:10px 13px;font-size:12px;color:#065F46}

/* MISC */
.multi-check{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.multi-check-item{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1.5px solid var(--border);
  border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;background:var(--bg-white);transition:all .15s}
.multi-check-item.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.coffee-pair{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px}
.security-section{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:var(--radius-lg);padding:14px;margin-bottom:4px}
.contractor-section{background:#F0FDF4;border:1.5px solid #A7F3D0;border-radius:var(--radius-lg);padding:14px;margin-top:8px}
.copy-btn{padding:4px 10px;border:1.5px solid var(--blue);border-radius:var(--radius);background:transparent;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.task-card{border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;background:var(--bg-white)}
.task-card-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-card);border-bottom:1px solid var(--border)}
.task-card-body{padding:10px 14px}
.task-line{font-size:12px;padding:4px 0;border-bottom:1px solid var(--bg-card);display:flex;gap:6px;align-items:baseline}
.task-line:last-child{border-bottom:none}
.setup-banner{background:var(--amber-light);border:1.5px solid #FDE68A;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:20px;font-size:13px}
.settings-section{background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.donor-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--blue-light);
  color:var(--blue);border-radius:20px;font-size:11px;font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;
  padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:9999;opacity:0;
  transition:opacity .3s;pointer-events:none;font-family:var(--font);font-weight:500}
.toast.show{opacity:1}

/* DOC MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,37,53,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-white);border-radius:var(--radius-lg);padding:24px;max-width:500px;width:100%;box-shadow:var(--shadow-md)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}
</style>
</head>

function gc(costs,cat,key,city){const m=costs[cat]||DEFAULT_COSTS[cat];return((m[city])||m.def||{})[key]||0;}

function calcBudget(f,costs){
  const C=costs||DEFAULT_COSTS;const city=f.city||"Київ";const p=parseInt(f.participants)||0;
  const isOnline=f.eventFormat==="Онлайн";
  let total=0;const lines=[];
  if(f.needHall&&!isOnline){
    const fd=f.duration==="Повний день"||f.duration==="Кілька днів";
    const pp=p<=50?(fd?"sf":"sh"):p<=100?(fd?"mf":"mh"):(fd?"lf":"lh");
    const a=gc(C,"hall",pp,city);
    if(a){total+=a;lines.push({label:`Оренда залу (${f.duration||"повний день"})`,amount:a});}
  }
  // Welcome coffee
  if(f.coffeeWelcome&&p>0){const key=f.coffeeWelcomeType==="light"?"cb":f.coffeeWelcomeType==="ext"?"cp":"cs";const a=gc(C,"cat",key,city)*p;total+=a;lines.push({label:`Вітальна кава (${p} ос)`,amount:a});}
  // Coffee breaks
  if(f.coffeeBreak&&p>0){const cnt=parseInt(f.coffeeBreakCount)||1;const key=f.coffeeBreakType==="light"?"cb":f.coffeeBreakType==="ext"?"cp":"cs";const a=gc(C,"cat",key,city)*p*cnt;total+=a;lines.push({label:`Кава-паузи ${cnt}×${p} ос`,amount:a});}
  // Final coffee
  if(f.coffeeFinal&&p>0){const key=f.coffeeFinalType==="light"?"cb":f.coffeeFinalType==="buffet"?"frs":f.coffeeFinalType==="ext"?"cp":"cs";const a=gc(C,"cat",key,city)*p;total+=a;lines.push({label:`Фінальна кава${f.coffeeFinalType==="buffet"?" (фуршет)":""} (${p} ос)`,amount:a});if(f.coffeeFinalWine&&p>0){const wine=Math.round(300*p);total+=wine;lines.push({label:`Вино (${p} ос)`,amount:wine});}}
  if(f.breakfast&&p>0){const a=400*p;total+=a;lines.push({label:`Сніданок (${p} ос)`,amount:a});}
  if(f.water&&p>0){const a=gc(C,"cat","w",city)*p;total+=a;lines.push({label:`Вода (${p} ос)`,amount:a});}
  if(f.lunch&&p>0){const a=gc(C,"cat","lb",city)*p;total+=a;lines.push({label:`Обід (${p} ос)`,amount:a});}
  if(f.dinner&&p>0){const a=gc(C,"cat","frs",city)*p;total+=a;lines.push({label:`Вечеря (${p} ос)`,amount:a});}
  if(f.translation){const a=gc(C,"tech","tr",city);total+=a;lines.push({label:"Синхронний переклад",amount:a});}
  const hasStream=f.stream||f.streamYoutubeUkr||f.streamYoutubeEng||f.streamCrosspost||f.streamFB;
  if(hasStream){
    if(f.confService){
      const hasCrosspost=f.streamYoutubeUkr||f.streamYoutubeEng||f.streamCrosspost||f.streamFB;
      const streamAmt=hasCrosspost?38000:31000;
      total+=streamAmt;lines.push({label:`Трансляція + обладнання (конференц-сервіс)`,amount:streamAmt});
    } else {
      const a=gc(C,"tech","st",city);total+=a;lines.push({label:"Онлайн-трансляція",amount:a});
    }
  }
  if(f.photographer){const hrs=parseInt(f.photographerHours)||1;const a=gc(C,"tech","ph",city)*hrs;total+=a;lines.push({label:`Фотограф (${hrs} год)`,amount:a});}
  if(f.videographer){const a=gc(C,"tech","vd",city);total+=a;lines.push({label:"Відеооператор",amount:a});}
  if(f.badges&&p>0){const a=gc(C,"tech","bg",city)*p;total+=a;lines.push({label:`Бейджі (${p} ос)`,amount:a});}
  if(f.printedPrograms&&p>0){const a=gc(C,"tech","pr",city)*p;total+=a;lines.push({label:`Програми (${p} ос)`,amount:a});}
  if(f.confService&&total>0){const fee=Math.round(total*(C.confFee||10)/100);total+=fee;lines.push({label:`Конференц-сервіс (${C.confFee||5}%)`,amount:fee});}
  return{total,lines};
}

function genChecklist(f,taskTemplates,team){
  const ed=f.eventDate?new Date(f.eventDate):null;
  const today=new Date();today.setHours(0,0,0,0);
  const dd=d=>{
    if(d===0)return{label:"День заходу",date:ed};
    if(d<0){const dt=ed?new Date(ed):null;dt&&dt.setDate(dt.getDate()+Math.abs(d));return{label:`${Math.abs(d)} дн. після`,date:dt};}
    if(!ed)return{label:`за ${d} днів`,date:null};
    const dt=new Date(ed);dt.setDate(dt.getDate()-d);return{label:dt.toLocaleDateString("uk-UA"),date:dt};
  };
  const roleMap={
    expert:f.expertName||"Експерт",coord:f.coordinator||"Координатор",
    comm:f.commManager||"Комунікаційник",dmitro:"Дмитро Український",other:"Відповідальний",
  };
  const condMap={
    registrationForm:!!f.registrationForm,hasDonor:!!(f.donor&&f.donor!=="Без донора"),
    websiteAnnounce:!!f.websiteAnnounce,media:!!f.media,hasCoffee:!!(f.coffeeWelcome||f.coffeeBreak||f.coffeeFinal||f.breakfast||f.lunch||f.dinner),
    translation:!!f.translation,confService:!!f.confService,photographer:!!f.photographer,
    videographer:!!f.videographer,donorApproval:!!f.donorApproval,nameplates:!!f.nameplates,
    banner:!!f.banner,stream:!!(f.stream||f.streamYoutubeUkr||f.streamYoutubeEng||f.streamFB||f.streamCrosspost),needHall:!!f.needHall,pressRelease:!!f.pressRelease,
    publishResearch:!!f.publishResearch,donorReport:!!f.donorReport,newsOnEventDay:!!f.newsOnEventDay,
    flipchart:!!f.flipchart,folders:!!f.folders,notebooks:!!f.notebooks,badges:!!f.badges,
    hasAccommodation:!!(parseInt(f.accommodation)>0),hasTravel:!!(parseInt(f.travel)>0),
  };
  return(taskTemplates||DEFAULT_TASKS).filter(t=>!t.cond||condMap[t.cond]!==false&&condMap[t.cond]!==undefined?!t.cond||!!condMap[t.cond]:false).map(t=>{
    const dl=dd(t.d);const isOverdue=dl.date&&dl.date<today&&t.d>=0;
    return{...t,who:roleMap[t.role]||t.role,dl:dl.label,dlDate:dl.date?.toISOString(),done:false,overdue:isOverdue};
  });
}

async function sheetsRequest(apiUrl,action,data){
  if(!apiUrl)return null;
  try{
    let url=`${apiUrl}?action=${encodeURIComponent(action)}`;
    if(data)for(const[k,v]of Object.entries(data))url+=`&${k}=${encodeURIComponent(typeof v==="object"?JSON.stringify(v):v)}`;
    const r=await fetch(url,{method:"GET",redirect:"follow"});
    const text=await r.text();try{return JSON.parse(text);}catch{return null;}
  }catch(e){console.error(e);return null;}
}

function showToast(msg,type="info"){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast("Скопійовано!")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("Скопійовано!");
  });
}

function Sel({val,set,opts,ph}){
  return<select value={val||""}onChange={e=>set(e.target.value)}>
    {ph&&<option value="">{ph}</option>}
    {opts.map(o=>typeof o==="string"?<option key={o}value={o}>{o}</option>:<option key={o.v}value={o.v}>{o.l}</option>)}
  </select>;
}
function TeamSel({val,set,team,ph,filterRole}){
  const filtered=filterRole?(team||DEFAULT_TEAM).filter(m=>m.role===filterRole):(team||DEFAULT_TEAM);
  return<select value={val||""}onChange={e=>set(e.target.value)}>
    <option value="">{ph||"— оберіть —"}</option>
    {filtered.map(m=><option key={m.email}value={m.name}>{m.name}</option>)}
  </select>;
}
function Inp({val,set,ph,type="text",min,max}){return<input type={type}value={val||""}onChange={e=>set(e.target.value)}placeholder={ph||""}min={min}max={max}/>;}
function TA({val,set,ph,rows=2}){return<textarea value={val||""}onChange={e=>set(e.target.value)}placeholder={ph||""}rows={rows}/>;}
function CB({checked,set,label}){return<label className="cb-row"><input type="checkbox"checked={!!checked}onChange={e=>set(e.target.checked)}/>{label}</label>;}
function F({label,req,children,hint}){
  return<div className="field">
    <div className="field-label">{label}{req&&<span style={{color:"var(--red)"}}> *</span>}</div>
    {children}
    {hint&&<div className="field-hint">{hint}</div>}
  </div>;
}
function ST({children,icon}){return<div className="section-title">{icon&&<span>{icon}</span>}{children}</div>;}
function MultiCheck({options,selected,onChange}){
  const sel=selected||[];
  const toggle=v=>onChange(sel.includes(v)?sel.filter(x=>x!==v):[...sel,v]);
  return<div className="multi-check">{options.map(o=><div key={o}className={`multi-check-item${sel.includes(o)?" selected":""}`}onClick={()=>toggle(o)}>{o}</div>)}</div>;
}

// ══ GENERATE DOCUMENT HTML ══════════════════════════════

    <tr><td>Тривалість</td><td>${f.duration||"—"}${f.durationHours?` (${f.durationHours} год)`:""}</td></tr></table>`);

  if(blocks.includes("team")){
    sections.push(`<h2>Відповідальні</h2>
    <table><tr><td>Експерт ЦППР</td><td>${f.expertName||"—"}</td></tr>
    <tr><td>Координатор</td><td>${f.coordinator||"—"}</td></tr>
    <tr><td>Комунікаційний менеджер</td><td>${f.commManager||"—"}</td></tr>
    <tr><td>Асистент</td><td>${f.assistant||"—"}</td></tr></table>`);
  }
  if(blocks.includes("participants")){
    sections.push(`<h2>Учасники</h2>
    <table><tr><td>Кількість</td><td>${f.participants||"—"}</td></tr>
    <tr><td>Тип розсадки</td><td>${f.seating||"—"}</td></tr>
    <tr><td>Склад аудиторії</td><td>${(f.audienceItems||[]).join(", ")||"—"}${f.audienceOther?", "+f.audienceOther:""}</td></tr>
    ${docType!=="donor"?`<tr><td>Учасники з регіонів</td><td>${f.regionParticipants||"—"}</td></tr>`:""}
    <tr><td>Потреба у проживанні</td><td>${f.accommodation||0} ос.</td></tr>
    <tr><td>Відшкодування проїзду</td><td>${f.travel||0} ос.</td></tr></table>`);
  }
  if(blocks.includes("tech")){
    const techItems=[f.needHall&&"Оренда залу",f.micGoose&&"Мікрофони-гусаки",f.micRadio&&"Радіомікрофони",f.projector&&"Проектор і екран",f.laptop&&"Ноутбук",f.flipchart&&`Фліпчарт${f.flipchartCount>1?` (${f.flipchartCount} шт)`:""}`,(f.streamYoutubeUkr||f.streamYoutubeEng||f.streamFB||f.streamCrosspost)&&`Трансляція (${[f.streamYoutubeUkr&&"YouTube укр",f.streamYoutubeEng&&"YouTube eng",f.streamFB&&"Facebook",f.streamCrosspost&&"Кроспостинг"].filter(Boolean).join(", ")})`,f.onlineZoom&&"Zoom",f.onlineTeams&&"Teams",f.onlineMeets&&"Google Meet",f.translation&&"Синхронний переклад",f.photographer&&`Фотограф${f.photographerHours?` (${f.photographerHours} год)`:""}`,f.videographer&&"Відеооператор",f.recording&&"Запис"].filter(Boolean);
    sections.push(`<h2>Технічне забезпечення</h2><ul>${techItems.map(i=>`<li>${i}</li>`).join("")||"<li>—</li>"}</ul>`);
  }
  if(blocks.includes("catering")){
    const cats=[];
    const cfl=t=>t==="light"?"легка":t==="ext"?"розширена":t==="buffet"?"фуршет":"стандарт";
    if(f.breakfast)cats.push("Сніданок");
    if(f.coffeeWelcome)cats.push(`Вітальна кава (${cfl(f.coffeeWelcomeType)})`);
    if(f.coffeeBreak)cats.push(`Кава-пауза ×${f.coffeeBreakCount||1} (${cfl(f.coffeeBreakType)})`);
    if(f.water)cats.push("Вода на стіл");
    if(f.lunch)cats.push("Обід");
    if(f.coffeeFinal)cats.push(`Фінальна кава (${cfl(f.coffeeFinalType)})${f.coffeeFinalWine?" + вино":""}`);
    if(f.dinner)cats.push("Вечеря");
    sections.push(`<h2>Харчування</h2><ul>${cats.map(i=>`<li>${i}</li>`).join("")||"<li>—</li>"}</ul>`);
  }
  if(blocks.includes("print")){
    const items=[f.badges&&"Бейджі",f.printedPrograms&&"Друковані програми",f.folders&&"Папки учасника",f.notebooks&&"Блокноти і ручки",f.nameplates&&"Таблички на стіл",f.banner&&"Банер"].filter(Boolean);
    sections.push(`<h2>Поліграфія</h2><ul>${items.map(i=>`<li>${i}</li>`).join("")||"<li>—</li>"}</ul>`);
  }
  if(blocks.includes("security")){
    const sec=[f.secShelter&&"Наявність укриття на локації",f.secUDO&&"Координація з УДО",f.secAccreditation&&"Акредитація учасників на вході",f.secGenerator&&"Резервне живлення (генератор)",f.secInternational&&"Інструктаж для міжнародних учасників",f.secNoPhoto&&"Заборона фото/відео"].filter(Boolean);
    sections.push(`<h2>🔒 Безпека</h2><ul>${sec.map(i=>`<li>${i}</li>`).join("")||"<li>Особливих вимог не зазначено</li>"}</ul>${f.secNotes?`<p>${f.secNotes}</p>`:""}`);
  }
  if(blocks.includes("donor")){
    sections.push(`<h2>Комунікації та донор</h2>
    <table><tr><td>Залучення ЗМІ</td><td>${yn(f.media)}</td></tr>
    <tr><td>Анонс на сайті ЦППР</td><td>${yn(f.websiteAnnounce)}</td></tr>
    <tr><td>Донор залучений до організації</td><td>${yn(f.donorInvolved)}</td></tr>
    <tr><td>Донор фінансує частину</td><td>${yn(f.donorFunds)}</td></tr>
    <tr><td>Погодження програми з донором</td><td>${yn(f.donorApproval)}</td></tr>
    <tr><td>Погодження новин/постів</td><td>${yn(f.donorNewsApproval)}</td></tr>
    <tr><td>Надіслати звіт донору</td><td>${yn(f.donorReport)}</td></tr></table>`);
  }
  if(blocks.includes("budget")){
    sections.push(`<h2>Орієнтовний бюджет</h2>
    <table><tr><th>Стаття витрат</th><th>Сума, грн</th></tr>
    ${budget.lines.map(l=>`<tr><td>${l.label}</td><td>${l.amount.toLocaleString("uk-UA")}</td></tr>`).join("")}
    <tr class="total"><td><b>Разом</b></td><td><b>${budget.total.toLocaleString("uk-UA")}</b></td></tr></table>`);
  }
  if(blocks.includes("checklist")&&ev.checklist?.length){
    const groups=[...new Set(ev.checklist.map(t=>t.g))];
    sections.push(`<h2>Чеклист задач</h2>${groups.map(g=>`<h3>${g}</h3><ul>${ev.checklist.filter(t=>t.g===g).map(t=>`<li${t.done?' style="text-decoration:line-through;color:#999"':''}><b>${t.who}</b> — ${t.t} <span style="color:#999">(${t.dl||"—"})</span></li>`).join("")}</ul>`).join("")}`);
  }
  return`<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8">
  <title>${f.eventName||"Захід ЦППР"}</title>
  <style>body{font-family:Arial,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;color:#1A2535;font-size:13px}
  .doc-header{display:flex;align-items:center;gap:12px;border-bottom:3px solid #1C75BC;padding-bottom:16px;margin-bottom:24px}
  .doc-header img{width:40px;height:40px}
  .doc-title h1{font-size:18px;color:#252868;margin:0}.doc-title p{font-size:11px;color:#6B7A90;margin:2px 0 0}
  h2{font-size:14px;color:#1C75BC;border-bottom:1px solid #D0DCE8;padding-bottom:6px;margin:24px 0 10px}
  h3{font-size:12px;color:#6B7A90;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.06em}
  table{width:100%;border-collapse:collapse;margin-bottom:10px}
  td,th{padding:6px 10px;border:1px solid #D0DCE8;font-size:12px}td:first-child{color:#6B7A90;width:40%}
  th{background:#F0F4F8;font-weight:600}tr.total td{background:#E8F3FB}
  ul{padding-left:18px;margin:0 0 10px}li{margin:3px 0;font-size:12px}
  .footer{margin-top:40px;padding-top:16px;border-top:1px solid #D0DCE8;font-size:11px;color:#9AAABB;text-align:center}
  </style></head><body>
  <div class="doc-header">
    <img src="${LOGO_B64}" alt="ЦППР" style="width:50px;height:50px;object-fit:contain"/>
    <div class="doc-title"><h1>${f.eventName||"Захід ЦППР"}</h1>
    <p>Центр політико-правових реформ — Система заявок на заходи</p>
    <p>Сформовано: ${new Date().toLocaleDateString("uk-UA")}</p></div>
  </div>
  ${sections.join("\n")}
  <div class="footer">ЦППР — Центр політико-правових реформ · cplr.org.ua</div>
  </body></html>`;
}

            <button key={o.v}onClick={()=>setDocType(o.v)}style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${docType===o.v?"var(--blue)":"var(--border)"}`,background:docType===o.v?"var(--blue-light)":"transparent",color:docType===o.v?"var(--blue)":"var(--text2)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)"}}>
              {o.l}
            </button>
          ))}
        </div>
      </F>
      {docType==="contractor"&&<F label="Оберіть блоки">
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {allBlocks.map(b=>(
            <label key={b.id}style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",border:`1.5px solid ${customBlocks.includes(b.id)?"var(--blue)":"var(--border)"}`,borderRadius:20,cursor:"pointer",fontSize:12,background:customBlocks.includes(b.id)?"var(--blue-light)":"var(--bg-white)",color:customBlocks.includes(b.id)?"var(--blue)":"var(--text2)"}}>
              <input type="checkbox"checked={customBlocks.includes(b.id)}onChange={e=>{setCustomBlocks(e.target.checked?[...customBlocks,b.id]:customBlocks.filter(x=>x!==b.id));}}style={{width:13,height:13,accentColor:"var(--blue)"}}/>
              {b.l}
            </label>
          ))}
        </div>
      </F>}
      <div style={{display:"flex",gap:8,marginTop:16}}>
        <button className="btn-primary"onClick={generateAndOpen}>📄 Відкрити PDF</button>
        <button className="btn-outline"onClick={generateDocx}>📝 Завантажити .txt</button>
        <button className="btn-outline"style={{marginLeft:"auto"}}onClick={onClose}>Закрити</button>
      </div>
      <div className="alert-info"style={{marginTop:12}}>PDF: відкриється у новій вкладці — натисніть Ctrl+P → «Зберегти як PDF»</div>
    </div>
  </div>;
}

// ══ MAIN APP ════════════════════════════════════════════
function App(){
  const [view,setView]=useState("list");
  const [evs,setEvs]=useState([]);
  const [cid,setCid]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [tab,setTab]=useState("form");
  const [showDocModal,setShowDocModal]=useState(false);
  const [config,setConfig]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_config"))||DEFAULT_CONFIG;}catch{return DEFAULT_CONFIG;}});
  const [team,setTeam]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_team"))||DEFAULT_TEAM;}catch{return DEFAULT_TEAM;}});
  const [costs,setCosts]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_costs"))||DEFAULT_COSTS;}catch{return DEFAULT_COSTS;}});
  const [tasks,setTasks]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_tasks"))||DEFAULT_TASKS;}catch{return DEFAULT_TASKS;}});
  // venues replaced by venueType dropdown
  const [localConfig,setLocalConfig]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_config"))||DEFAULT_CONFIG;}catch{return DEFAULT_CONFIG;}});
  const [newMember,setNewMember]=useState({name:"",email:"",role:"expert"});
  const [settingsTab,setSettingsTab]=useState("general");
  const [eventTypesList,setEventTypesList]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_event_types"))||DEFAULT_EVENT_TYPES;}catch{return DEFAULT_EVENT_TYPES;}});
  const [accessTypesList,setAccessTypesList]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_access_types"))||DEFAULT_ACCESS_TYPES;}catch{return DEFAULT_ACCESS_TYPES;}});
  const [donorsList,setDonorsList]=useState(()=>{try{return JSON.parse(localStorage.getItem("cppr_donors"))||DEFAULT_DONORS;}catch{return DEFAULT_DONORS;}});
  const [newListItem,setNewListItem]=useState("");

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      if(config.sheetsApiUrl){const res=await sheetsRequest(config.sheetsApiUrl,"getAll",{});if(res?.events){setEvs(res.events);setLoading(false);return;}}
      try{const s=localStorage.getItem("cppr_events_v3");if(s)setEvs(JSON.parse(s));}catch(e){}
      setLoading(false);
    })();
  },[config.sheetsApiUrl]);

  const saveEvs=async(list)=>{
    setSaving(true);localStorage.setItem("cppr_events_v3",JSON.stringify(list));
    if(config.sheetsApiUrl)await sheetsRequest(config.sheetsApiUrl,"saveAll",{events:list});
    setSaving(false);
  };

  const getEv=()=>evs.find(e=>e.id===cid)||null;
  const createNew=()=>{
    const id=Date.now().toString();
    const n={id,status:"draft",createdAt:new Date().toISOString(),
      form:{city:"Київ",eventAccess:"Для запрошених",eventFormat:"Офлайн",duration:"Повний день",coffeeItems:[],streamPlatforms:[]},checklist:[]};
    const u=[n,...evs];setEvs(u);saveEvs(u);setCid(id);setTab("form");setView("detail");
  };
  const upd=(patch)=>{const u=evs.map(e=>e.id===cid?{...e,...patch}:e);setEvs(u);saveEvs(u);};
  const uf=(field,val)=>{const ev=getEv();upd({form:{...ev.form,[field]:val}});};
  const delEv=(id)=>{if(!confirm("Видалити заявку?"))return;const u=evs.filter(e=>e.id!==id);setEvs(u);saveEvs(u);if(cid===id)setView("list");};
  const approve=()=>{const ev=getEv();upd({status:"approved",checklist:genChecklist(ev.form,tasks,team),approvedAt:new Date().toISOString()});setTab("checklist");showToast("Затверджено! Чеклист сформовано.");};
  const toggleCL=(idx)=>{
    const ev=getEv();const today=new Date();today.setHours(0,0,0,0);
    const cl=ev.checklist.map((t,i)=>{if(i!==idx)return t;const u={...t,done:!t.done};if(u.dlDate){const dl=new Date(u.dlDate);u.overdue=!u.done&&dl<today&&t.d>=0;}return u;});
    upd({checklist:cl});
  };

  const saveConfig=c=>{setConfig(c);localStorage.setItem("cppr_config",JSON.stringify(c));};
  const saveTeam=t=>{setTeam(t);localStorage.setItem("cppr_team",JSON.stringify(t));};
  const saveTasks=t=>{setTasks(t);localStorage.setItem("cppr_tasks",JSON.stringify(t));};
  
  const saveCosts=c=>{setCosts(c);localStorage.setItem("cppr_costs",JSON.stringify(c));};
  const saveEventTypes=l=>{setEventTypesList(l);localStorage.setItem("cppr_event_types",JSON.stringify(l));};
  const saveAccessTypes=l=>{setAccessTypesList(l);localStorage.setItem("cppr_access_types",JSON.stringify(l));};
  const saveDonors=l=>{setDonorsList(l);localStorage.setItem("cppr_donors",JSON.stringify(l));};

  const Header=()=><div className="app-header">
    <div className="header-inner">
      <img src={LOGO_B64} className="header-logo" alt="ЦППР"/>
      <div className="header-brand">
        <span className="header-brand-sub">Центр політико-правових реформ</span>
      </div>
      <div className="header-divider"/>
      <span className="header-title">Система заявок на заходи</span>
      <div className="header-right">
        <span className="header-version">v3.0</span>
        {view!=="settings"&&<button className="btn-outline"style={{fontSize:11}}onClick={()=>setView("settings")}>⚙ Налаштування</button>}
        {view!=="list"&&<button className="btn-outline"style={{fontSize:11}}onClick={()=>setView("list")}>← До списку</button>}
      </div>
    </div>
  </div>;

  if(loading)return<><Header/><div style={{padding:60,textAlign:"center",color:"var(--text2)"}}>
    <div className="spinner"style={{width:28,height:28,margin:"0 auto 12px"}}></div>
    <div style={{fontSize:13}}>Завантаження...</div></div></>;

  // ══ LIST ══
  if(view==="list"){
    return<><Header/><div className="app">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:"var(--text)"}}>Заявки на заходи</div>
          <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{evs.length} заявок у системі</div>
        </div>
        <button className="btn-primary"onClick={createNew}>+ Нова заявка</button>
      </div>
      {false&&<div className="setup-banner">
        ⚠ <b>Google Sheets не підключено</b> — дані зберігаються локально в цьому браузері.
        <button onClick={()=>setView("settings")}style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",padding:"0 4px",fontSize:13,textDecoration:"underline",fontFamily:"var(--font)"}}>Налаштувати</button>
      </div>}
      {evs.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"var(--text2)"}}>
        <div style={{fontSize:36,marginBottom:12}}>📋</div>
        <div style={{fontSize:14,fontWeight:500}}>Заявок поки немає</div>
        <div style={{fontSize:12,marginTop:4}}>Натисніть «+ Нова заявка» щоб розпочати</div>
      </div>}
      {["approved","review","draft","cancelled","done"].map(s=>{
        const list=evs.filter(e=>e.status===s);if(!list.length)return null;
        return<div key={s}style={{marginBottom:24}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:SC[s],display:"inline-block"}}/>
            {SL[s]} ({list.length})
          </div>
          {list.map(ev=>(
            <div key={ev.id}className="card"style={{marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,transition:"all .15s"}}
              onClick={()=>{setCid(ev.id);setTab("form");setView("detail");}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:3}}>{ev.form?.eventName||"— Без назви —"}</div>
                <div style={{fontSize:12,color:"var(--text2)",display:"flex",gap:8,flexWrap:"wrap"}}>
                  {ev.form?.eventFormat&&<span>{ev.form.eventFormat}</span>}
                  {ev.form?.eventType&&<span>· {ev.form.eventType}</span>}
                  {ev.form?.city&&<span>· {ev.form.city}</span>}
                  {ev.form?.eventDate&&<span>· {ev.form.eventDate}</span>}
                </div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
                  {ev.form?.expertName&&<span>Експерт: {ev.form.expertName}</span>}
                  {ev.form?.donor&&ev.form.donor!=="Без донора"&&<span className="donor-badge">{ev.form.donor}</span>}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                <Badge s={ev.status}/>
                {ev.checklist?.length>0&&(()=>{const od=ev.checklist.filter(t=>t.overdue&&!t.done).length;
                  return<div style={{fontSize:10,color:od>0?"var(--red)":"var(--text3)",fontWeight:od>0?700:400}}>
                    {od>0&&`⚠ ${od} просрочено · `}{ev.checklist.filter(t=>t.done).length}/{ev.checklist.length} задач</div>;})()}
                <button onClick={e=>{e.stopPropagation();delEv(ev.id);}}style={{fontSize:10,color:"var(--text3)",background:"none",border:"none",cursor:"pointer",padding:0}}>видалити</button>
              </div>
            </div>
          ))}
        </div>;
      })}
    </div></>;
  }

  // ══ SETTINGS ══
  if(view==="settings"){
    const stabs=[{id:"team",l:"Команда"},{id:"lists",l:"Довідники"},{id:"tasks",l:"Задачі"},{id:"costs",l:"Вартості"},{id:"general",l:"Підключення"}];
    const EditableList=({items,onSave})=>{
      const [list,setList]=useState([...items]);
      const [newItem,setNewItem]=useState("");
      const move=(i,dir)=>{const l=[...list];const t=l[i];l[i]=l[i+dir];l[i+dir]=t;setList(l);onSave(l);};
      return<div>
        <div style={{maxHeight:240,overflowY:"auto",marginBottom:8}}>
          {list.map((item,i)=><div key={i}style={{display:"flex",gap:5,marginBottom:4,alignItems:"center"}}>
            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              <button onClick={()=>i>0&&move(i,-1)}style={{background:"none",border:"none",color:i>0?"var(--text2)":"var(--border)",cursor:i>0?"pointer":"default",fontSize:10,lineHeight:1,padding:"1px 3px",fontFamily:"var(--font)"}}>▲</button>
              <button onClick={()=>i<list.length-1&&move(i,1)}style={{background:"none",border:"none",color:i<list.length-1?"var(--text2)":"var(--border)",cursor:i<list.length-1?"pointer":"default",fontSize:10,lineHeight:1,padding:"1px 3px",fontFamily:"var(--font)"}}>▼</button>
            </div>
            <input value={item}onChange={e=>{const l=[...list];l[i]=e.target.value;setList(l);onSave(l);}}style={{flex:1,padding:"5px 8px",border:"1px solid var(--border)",borderRadius:"var(--radius)",fontSize:12,fontFamily:"var(--font)"}}/>
            <button onClick={()=>{const l=list.filter((_,j)=>j!==i);setList(l);onSave(l);}}style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:16}}>✕</button>
          </div>)}
        </div>
        <div style={{display:"flex",gap:6}}>
          <input value={newItem}onChange={e=>setNewItem(e.target.value)}placeholder="Додати..."onKeyDown={e=>{if(e.key==="Enter"&&newItem){const l=[...list,newItem];setList(l);onSave(l);setNewItem("");}}}style={{flex:1,padding:"6px 8px",border:"1px solid var(--border)",borderRadius:"var(--radius)",fontSize:12,fontFamily:"var(--font)"}}/>
          <button className="btn-ghost"onClick={()=>{if(newItem){const l=[...list,newItem];setList(l);onSave(l);setNewItem("");}}}style={{fontSize:12}}>+ Додати</button>
        </div>
      </div>;
    };
    return<><Header/><div className="app">
      <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Налаштування</div>
      <div className="tabs"style={{marginBottom:20}}>{stabs.map(t=><button key={t.id}className={`tab${settingsTab===t.id?" active":""}`}onClick={()=>setSettingsTab(t.id)}>{t.l}</button>)}</div>

      {settingsTab==="general"&&<div className="settings-section">
        <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Підключення Google Sheets</div>
        <F label="URL Google Apps Script"><Inp val={localConfig.sheetsApiUrl}set={v=>setLocalConfig({...localConfig,sheetsApiUrl:v})}ph="https://script.google.com/macros/s/.../exec"/></F>
        <button className="btn-primary"onClick={()=>{saveConfig(localConfig);showToast("Збережено!");}}>Зберегти</button>
        <div className="alert-info"style={{marginTop:10}}>Після збереження перезавантажте сторінку щоб підтягнулись дані.</div>
      </div>}

      {settingsTab==="team"&&<div className="settings-section">
        <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Команда ({team.length} осіб)</div>
        <div style={{maxHeight:320,overflowY:"auto",marginBottom:12}}>
          {team.map((m,i)=>(
            <div key={i}style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--bg-card)",fontSize:13}}>
              <div style={{flex:1}}>
                <b>{m.name}</b>
                <span style={{color:"var(--text2)",fontSize:11,marginLeft:8}}>{m.email}</span>
                <span style={{marginLeft:8,padding:"2px 7px",borderRadius:10,fontSize:10,fontWeight:600,
                  background:m.role==="comm"?"#E8F3FB":m.role==="expert"?"#E6F5F1":"var(--bg-card)",
                  color:m.role==="comm"?"var(--blue)":m.role==="expert"?"var(--green)":"var(--text2)"}}>
                  {m.role==="comm"?"Комунікаційник":m.role==="expert"?"Експерт":"Інша роль"}
                </span>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <select value={m.role||"other"}onChange={e=>{const t=[...team];t[i]={...t[i],role:e.target.value};saveTeam(t);setTeam(t);}}style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--border)",borderRadius:6,background:"var(--bg-white)",fontFamily:"var(--font)"}}>
                  <option value="expert">Експерт</option><option value="comm">Комунікаційник</option><option value="other">Інша роль</option>
                </select>
                <button onClick={()=>{const t=[...team];t.splice(i,1);saveTeam(t);setTeam(t);}}style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:16}}>✕</button>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 100px auto",gap:8,alignItems:"end"}}>
          <F label="Ім'я"><Inp val={newMember.name}set={v=>setNewMember({...newMember,name:v})}ph="Прізвище Ім'я"/></F>
          <F label="Email"><Inp val={newMember.email}set={v=>setNewMember({...newMember,email:v})}ph="name@pravo.org.ua"/></F>
          <F label="Роль"><select value={newMember.role}onChange={e=>setNewMember({...newMember,role:e.target.value})}style={{width:"100%",padding:"8px 8px",border:"1.5px solid var(--border)",borderRadius:"var(--radius)",fontSize:13,fontFamily:"var(--font)"}}>
            <option value="expert">Експерт</option><option value="comm">Комунікаційник</option><option value="other">Інша роль</option>
          </select></F>
          <button className="btn-primary"style={{marginBottom:12}}onClick={()=>{if(!newMember.name||!newMember.email)return;const t=[...team,newMember];saveTeam(t);setTeam(t);setNewMember({name:"",email:"",role:"expert"});showToast("Додано!");}}>Додати</button>
        </div>
      </div>}

      {settingsTab==="lists"&&<div>
        <div className="settings-section">
          <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Типи заходу</div>
          <EditableList items={eventTypesList}onSave={saveEventTypes}/>
        </div>
        <div className="settings-section">
          <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Типи доступу</div>
          <EditableList items={accessTypesList}onSave={saveAccessTypes}/>
        </div>
        <div className="settings-section">
          <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Донори</div>
          <EditableList items={donorsList}onSave={saveDonors}/>
        </div>
      </div>}

      {settingsTab==="tasks"&&<div className="settings-section">
        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Шаблони задач ({tasks.length})</div>
        <div style={{fontSize:11,color:"var(--text2)",marginBottom:10}}>Ролі: expert, coord, comm, dmitro, other</div>
        <div style={{maxHeight:420,overflowY:"auto"}}>
          {tasks.map((t,i)=>(
            <div key={i}style={{display:"grid",gridTemplateColumns:"1fr 80px 60px 30px",gap:6,marginBottom:6,alignItems:"center",padding:"7px",background:"var(--bg-card)",borderRadius:"var(--radius)"}}>
              <input value={t.t}onChange={e=>{const ts=[...tasks];ts[i]={...ts[i],t:e.target.value};saveTasks(ts);setTasks(ts);}}style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--border)",borderRadius:5,width:"100%",fontFamily:"var(--font)"}}/>
              <input value={t.role}onChange={e=>{const ts=[...tasks];ts[i]={...ts[i],role:e.target.value};saveTasks(ts);setTasks(ts);}}style={{fontSize:11,padding:"4px 6px",border:"1px solid var(--border)",borderRadius:5,fontFamily:"var(--font)"}}placeholder="роль"/>
              <input type="number"value={t.d}onChange={e=>{const ts=[...tasks];ts[i]={...ts[i],d:parseInt(e.target.value)||0};saveTasks(ts);setTasks(ts);}}style={{fontSize:12,padding:"4px 6px",border:"1px solid var(--border)",borderRadius:5,fontFamily:"var(--font)"}}/>
              <button onClick={()=>{const ts=tasks.filter((_,j)=>j!==i);saveTasks(ts);setTasks(ts);}}style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button className="btn-ghost"onClick={()=>{const ts=[...tasks,{g:"Нова група",d:7,t:"Нова задача",role:"coord"}];saveTasks(ts);setTasks(ts);}}>+ Задача</button>
          <button className="btn-outline"style={{color:"var(--red)",borderColor:"#fca5a5",fontSize:11}}onClick={()=>{if(confirm("Скинути до стандартних 74 задач?")){saveTasks(DEFAULT_TASKS);setTasks(DEFAULT_TASKS);showToast("Скинуто!");}}}>Скинути</button>
        </div>
      </div>}

      {settingsTab==="costs"&&<div>
        {["Київ","Львів","def"].map(city=>(
          <div key={city}className="settings-section">
            <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{city==="def"?"Інші міста":city}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {[
                {cat:"hall",key:"sf",label:"Зал <50 ос (день)"},
                {cat:"hall",key:"mf",label:"Зал 50-100 ос (день)"},
                {cat:"hall",key:"lf",label:"Зал 100+ ос (день)"},
                {cat:"cat",key:"cs",label:"Кава-пауза стандарт/ос"},
                {cat:"cat",key:"cp",label:"Кава-пауза преміум/ос"},
                {cat:"cat",key:"frs",label:"Фуршет/ос"},
                {cat:"cat",key:"lb",label:"Обід бізнес/ос"},
                {cat:"tech",key:"ph",label:"Фотограф/год"},
                {cat:"tech",key:"tr",label:"Переклад"},
                {cat:"tech",key:"st",label:"Трансляція"},
                {cat:"tech",key:"vd",label:"Відеооператор"},
                {cat:"tech",key:"bg",label:"Бейдж/шт"},
              ].map(({cat,key,label})=>{
                const val=(costs[cat]?.[city]||costs[cat]?.def||DEFAULT_COSTS[cat]?.def||{})[key]||0;
                return<div key={`${cat}-${key}`}>
                  <div style={{fontSize:10,color:"var(--text2)",marginBottom:2,fontWeight:600}}>{label}</div>
                  <input type="number"value={val}onChange={e=>{
                    const nc=JSON.parse(JSON.stringify(costs));

    {tab==="budget"&&<div>
      <div className="grid3"style={{marginBottom:18}}>
        {[{l:"Орієнтовний бюджет",v:`${budget.total.toLocaleString("uk-UA")} грн`},{l:"На учасника",v:f.participants?`${Math.round(budget.total/(parseInt(f.participants)||1)).toLocaleString("uk-UA")} грн`:"—"},{l:"Статей витрат",v:budget.lines.length}].map((c,i)=>(
          <div key={i}className="metric"><div className="metric-label">{c.l}</div><div className="metric-value">{c.v}</div></div>
        ))}
      </div>
      {budget.lines.length===0?<div style={{color:"var(--text2)",fontSize:13,padding:"16px 0"}}>Заповніть форму щоб побачити бюджет.</div>
        :<div style={{border:"1.5px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          {budget.lines.map((l,i)=><div key={i}className="budget-row"style={{background:i%2?"var(--bg-card)":"var(--bg-white)"}}><span>{l.label}</span><span style={{fontWeight:600,whiteSpace:"nowrap"}}>{l.amount.toLocaleString("uk-UA")} грн</span></div>)}
          <div className="budget-total"><span style={{color:"var(--blue)"}}>Разом</span><span style={{color:"var(--blue)",fontSize:15}}>{budget.total.toLocaleString("uk-UA")} грн</span></div>
        </div>}
      <div className="alert-warn"style={{marginTop:14}}>Бюджет орієнтовний. Вартості можна оновити в Налаштуваннях → Вартості.</div>
    </div>}

    {tab==="checklist"&&<div>
      {clOverdue>0&&<div className="alert-danger"style={{marginBottom:14}}>⚠ <b>{clOverdue} задач</b> мали бути виконані до сьогодні</div>}
      {!ev.checklist?.length?<div style={{color:"var(--text2)",fontSize:13,padding:"16px 0"}}>Натисніть «Затвердити + чеклист» щоб сформувати список задач.</div>
        :(() => {
          const groups=[...new Set(ev.checklist.map(t=>t.g))];
          return groups.map(g=>(
            <div key={g}style={{marginBottom:16}}>
              <div style={{fontSize:10,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:4,height:4,borderRadius:"50%",background:"var(--blue)",display:"inline-block"}}/>
                {g}
              </div>
              {ev.checklist.filter(t=>t.g===g).map(t=>{
                const idx=ev.checklist.indexOf(t);const isOd=t.overdue&&!t.done;
                return<div key={idx}className={`checklist-item${isOd?" overdue":""}`}onClick={()=>toggleCL(idx)}style={{opacity:t.done?.5:1}}>
                  <div className={`chk-box${t.done?" done":""}`}>{t.done&&<span style={{fontSize:11,color:"var(--green)",fontWeight:700}}>✓</span>}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,textDecoration:t.done?"line-through":"none",color:isOd?"var(--red)":"var(--text)"}}>{t.t}{isOd&&<span style={{fontSize:10,color:"var(--red)",fontWeight:700,marginLeft:6}}>ПРОСТРОЧЕНО</span>}</div>
                    <div style={{fontSize:11,color:isOd?"var(--red)":"var(--text3)",marginTop:2}}>{t.who} · {t.dl||"—"}</div>
                  </div>
                </div>;
              })}
            </div>
          ));
        })()}
    </div>}

    {tab==="tasks"&&<div>
      <div style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Натисніть «Копіювати» — текст листа скопіюється в буфер. Вставте у Gmail.</div>
      <div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",padding:13,marginBottom:14,border:"1px solid var(--border)"}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Google Calendar — подія заходу</div>
        {f.eventDate?<a href={`https://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent(f.eventName||"Захід ЦППР")}&dates=${(f.eventDate||"").replace(/-/g,"")}/${(f.eventDateEnd||f.eventDate||"").replace(/-/g,"")}&details=${encodeURIComponent(`Тип: ${f.eventType||""}\nФормат: ${f.eventFormat||""}\nДонор: ${f.donor||""}\nУчасники: ${f.participants||""}\nМісто: ${f.city||""}`)}&location=${encodeURIComponent(f.venue&&f.venue!=="Інше"?f.venue:f.venueCustom||f.city||"")}`}target="_blank"rel="noopener noreferrer"style={{fontSize:13}}>Відкрити в Google Calendar →</a>
          :<div style={{fontSize:12,color:"var(--text3)"}}>Вкажіть дату у формі.</div>}
      </div>
      {!ev.checklist?.length?<div style={{fontSize:13,color:"var(--text2)"}}>Спочатку затвердіть заявку.</div>
        :(() => {
          const assignees=[...new Set(ev.checklist.map(t=>t.who))];
          return assignees.map(who=>{
            const wtasks=ev.checklist.filter(t=>t.who===who);
            const member=(team||DEFAULT_TEAM).find(m=>m.name===who);
            const email=member?.email||"";
            const subj=`Задачі до заходу: ${f.eventName||"захід"} (${f.eventDate||""})`;
            const body=`Вітаємо, ${who}!\n\nЗахід: ${f.eventName||"—"}\nДата: ${f.eventDate||"—"}\nМісто: ${f.city||"—"}\n\nВаші задачі:\n\n${wtasks.map(t=>`• ${t.t}\n  Дедлайн: ${t.dl||"—"}`).join("\n\n")}\n\nЗ повагою,\nКоманда ЦППР`;
            return<div key={who}className="task-card">
              <div className="task-card-head">
                <div><span style={{fontWeight:600,fontSize:13}}>{who}</span>{email&&<span style={{fontSize:11,color:"var(--text2)",marginLeft:6}}>{email}</span>}</div>
                <button className="copy-btn"onClick={()=>copyText(`Кому: ${email}\nТема: ${subj}\n\n${body}`)}>Копіювати лист</button>
              </div>
              <div className="task-card-body">
                {wtasks.map((t,i)=><div key={i}className="task-line">
                  <span style={{color:t.overdue&&!t.done?"var(--red)":"var(--blue)",flexShrink:0}}>•</span>
                  <span style={{color:t.overdue&&!t.done?"var(--red)":"var(--text)"}}>{t.t}</span>
                  <span style={{color:"var(--text3)",whiteSpace:"nowrap",marginLeft:"auto"}}>({t.dl||"—"})</span>
                </div>)}
              </div>
            </div>;
          });
        })()}
    </div>}
  </div></>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
